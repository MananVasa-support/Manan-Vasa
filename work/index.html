<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Altus Corp — Incentive Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --red: #E8001D;
  --red-dark: #b71c1c;
  --red-light: rgba(232,0,29,0.10);
  --black: #0A0A0A;
  --black2: #111111;
  --black3: #1C1C1C;
  --grey-dark: #2A2A2A;
  --grey: #3D3D3D;
  --grey-mid: #666;
  --grey-light: #999;
  --grey-border: #333;
  --surface: #F0F0F0;
  --surface2: #E8E8E8;
  --surface-card: #EDEDED;
  --surface-border: #D8D8D8;
  --text-dark: #1A1A1A;
  --text-mid: #444;
  --text-light: #777;
  --white: #FFFFFF;
  --white-dim: rgba(255,255,255,0.88);
  --font: Arial, sans-serif;
  --sp-xs: clamp(4px, 0.5vw, 8px);
  --sp-sm: clamp(8px, 1vw, 12px);
  --sp-md: clamp(12px, 1.5vw, 20px);
  --sp-lg: clamp(16px, 2vw, 28px);
  --sp-xl: clamp(20px, 2.5vw, 36px);
  --fs-xs: clamp(9px, 0.7vw, 11px);
  --fs-sm: clamp(10px, 0.8vw, 12px);
  --fs-md: clamp(11px, 0.9vw, 13px);
  --fs-lg: clamp(13px, 1.1vw, 16px);
  --fs-xl: clamp(18px, 1.8vw, 26px);
  --fs-2xl: clamp(26px, 3vw, 42px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text-dark);
  min-height: 100vh;
  font-size: var(--fs-sm);
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--black);
  border-bottom: 3px solid var(--red);
  /* NOT sticky — scrolls with page */
  box-shadow: 0 6px 32px rgba(0,0,0,0.8);
  width: 100%;
}
.header-main {
  display: flex; align-items: center; gap: clamp(8px,1.2vw,16px);
  padding: clamp(8px,1vw,14px) 0 clamp(8px,1vw,14px) clamp(14px,2vw,32px);
  /* no right padding — logo bleeds to edge */
  flex-wrap: wrap;
}

.header-title-block { flex: 1; min-width: 200px; }
.header-title {
  font-size: clamp(16px,1.8vw,26px);
  font-weight: 900; letter-spacing: clamp(1px,0.3vw,4px);
  color: var(--white); text-transform: uppercase; line-height: 1.1;
  text-shadow: 0 2px 14px rgba(232,0,29,0.25);
}
.header-subtitle {
  font-size: var(--fs-xs); color: #777;
  letter-spacing: 2px; margin-top: 3px; text-transform: uppercase;
}

/* Logo — large, right side, blends with black header */
.altus-logo {
  flex-shrink: 0;
  /* Wide enough to show both shapes + text comfortably */
  width:  clamp(80px, 9vw, 130px);
  /* Align self stretch so it fills the full header-main row height */
  align-self: stretch;
  display: flex; align-items: center; justify-content: center;
  margin-left: auto;
  padding: 0 16px 0 0;
}
/*
  screen blend: on black bg — dark grey near-disappears, red & white stay vivid.
  Matches the reference exactly.
*/
.altus-logo-img {
  width: 100%; height: 100%;
  object-fit: contain;
  /* transparent bg - no blend mode needed */
  display: block;
}

/* Nav button row — grey background */
.header-nav {
  background: #2A2A2A;
  border-top: 1px solid #3a3a3a;
  padding: clamp(6px,0.7vw,10px) clamp(14px,2vw,32px);
  display: flex; gap: clamp(8px,1vw,12px); flex-wrap: wrap; align-items: center;
}
.nav-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, #1a0507 0%, #2a0a0f 100%);
  border: 1.5px solid #3a0a0f;
  color: #ddd; text-decoration: none;
  font-size: var(--fs-xs); font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; white-space: nowrap;
  padding: clamp(6px,0.7vw,9px) clamp(12px,1.2vw,18px);
  border-radius: 5px; transition: all 0.2s; cursor: pointer;
}
.nav-btn:hover {
  background: var(--red); border-color: var(--red);
  color: #fff; box-shadow: 0 2px 12px rgba(232,0,29,0.4);
}
.nav-btn svg { width: clamp(11px,1vw,14px); height: clamp(11px,1vw,14px); flex-shrink: 0; opacity: 0.85; }

/* ── MAIN ── */
.main { padding: var(--sp-lg) var(--sp-xl); max-width: 100%; overflow-x: hidden; }

/* ── SECTION HEADERS ── */
.section-header {
  display: flex; align-items: center; gap: var(--sp-sm);
  margin-bottom: var(--sp-md); margin-top: var(--sp-xl);
}
.section-header:first-child { margin-top: 0; }
.section-dot { width: 5px; height: clamp(22px,2vw,30px); background: var(--red); border-radius: 2px; flex-shrink: 0; }
.section-title {
  font-size: var(--fs-md); font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-dark); white-space: nowrap;
}
.section-line { flex: 1; height: 1px; background: var(--surface-border); }

/* ── METRIC CARDS — light grey inside ── */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%,200px),1fr));
  gap: var(--sp-md); margin-bottom: var(--sp-lg);
}
.metric-card {
  background: var(--surface-card);
  border: 1px solid var(--surface-border);
  border-radius: 10px;
  padding: var(--sp-md) clamp(14px,1.5vw,22px);
  position: relative; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.metric-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--surface-border);
}
.metric-card.accent::before { background: var(--red); }
.metric-card .m-label { font-size: var(--fs-xs); color: var(--text-light); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.metric-card .m-value { font-size: clamp(20px,2.2vw,30px); font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; word-break: break-all; }
.metric-card .m-sub { font-size: var(--fs-xs); color: var(--text-light); margin-top: 5px; }

/* ── FILTER BAR — light grey ── */
.filter-bar {
  display: flex; gap: var(--sp-md); align-items: flex-end; flex-wrap: wrap;
  background: var(--surface-card); border: 1px solid var(--surface-border);
  border-radius: 10px; padding: var(--sp-md); margin-bottom: var(--sp-md);
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.filter-group { display: flex; flex-direction: column; gap: 5px; min-width: min(100%,180px); flex: 1; }
.filter-label { font-size: var(--fs-xs); color: var(--text-light); letter-spacing: 1.5px; text-transform: uppercase; }
.filter-select {
  background: var(--surface2); border: 1px solid var(--surface-border);
  color: var(--text-dark); padding: 8px 10px; border-radius: 6px;
  font-family: var(--font); font-size: var(--fs-sm); cursor: pointer;
  outline: none; transition: border 0.2s; width: 100%;
}
.filter-select:hover, .filter-select:focus { border-color: var(--red); }

/* ── MULTI-SELECT — light grey ── */
.multi-select-wrapper { position: relative; width: 100%; }
.multi-select-trigger {
  background: var(--surface2); border: 1px solid var(--surface-border);
  color: var(--text-dark); padding: 8px 10px; border-radius: 6px;
  font-family: var(--font); font-size: var(--fs-sm); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  gap: 6px; width: 100%; user-select: none; transition: border 0.2s;
}
.multi-select-trigger:hover, .multi-select-trigger.open { border-color: var(--red); }
.multi-select-trigger .arrow { font-size: 8px; opacity: 0.4; flex-shrink: 0; }
.multi-select-trigger .ms-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.multi-select-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; z-index: 600;
  background: #fff; border: 1.5px solid var(--red);
  border-radius: 8px; width: max(100%,210px);
  max-height: min(280px,42vh); overflow-y: auto;
  display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.14);
}
.multi-select-dropdown.open { display: block; }
.multi-select-option {
  padding: 9px 13px; cursor: pointer; font-size: var(--fs-sm);
  display: flex; align-items: center; gap: 9px; transition: background 0.12s;
  color: var(--text-dark);
}
.multi-select-option:hover { background: #FFECEE; }
.multi-select-option.selected { color: var(--red); font-weight: 600; }
.multi-select-option input[type=checkbox] { accent-color: var(--red); flex-shrink: 0; }
.multi-select-divider { height: 1px; background: #eee; }

/* ── TABLES ── */
.table-wrap {
  overflow-x: auto;
  overflow-y: auto;           /* allow vertical scroll so sticky works */
  max-height: 480px;          /* cap height so thead sticks */
  border-radius: 10px;
  border: 1px solid var(--surface-border); margin-bottom: var(--sp-lg);
  -webkit-overflow-scrolling: touch;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: var(--fs-sm); }

/* Sticky table header */
thead tr { background: var(--black); }
thead th {
  padding: clamp(10px,1vw,14px) clamp(10px,1vw,16px);
  text-align: left; font-size: var(--fs-xs); font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: #aaa;
  border-bottom: 2px solid #444; white-space: nowrap;
  position: sticky; top: 0; z-index: 10;
  background: var(--black); /* re-declare so it paints over rows */
}

tbody tr { background: #F7F7F7; border-bottom: 1px solid var(--surface-border); transition: background 0.13s; }
tbody tr:nth-child(even) { background: var(--surface-card); }
tbody tr:hover { background: #FFE8EB; cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: clamp(8px,0.8vw,11px) clamp(10px,1vw,16px); color: var(--text-dark); }
tbody td.amount { font-weight: 700; color: var(--text-dark); font-variant-numeric: tabular-nums; white-space: nowrap; }
tbody td.green { color: #2E7D32; font-weight: 700; white-space: nowrap; }
tbody td.red-text { color: var(--red); font-weight: 700; white-space: nowrap; }
.clickable-name { cursor: pointer; color: var(--red); text-decoration: underline; text-underline-offset: 2px; }
.clickable-name:hover { color: var(--red-dark); }

/* Sticky total row — pinned to bottom of table-wrap */
.total-row td {
  background: var(--black) !important; color: #fff !important;
  font-weight: 800; border-top: 2px solid var(--red) !important;
  position: sticky; bottom: 0; z-index: 9;
}

/* ── CHART CARDS — light grey ── */
.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%,320px),1fr));
  gap: var(--sp-md); margin-bottom: var(--sp-lg);
}
.chart-card {
  background: var(--surface-card); border: 1px solid var(--surface-border);
  border-radius: 10px; padding: var(--sp-md);
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.chart-title {
  font-size: var(--fs-xs); font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text-light); margin-bottom: var(--sp-sm);
}
.chart-container { position: relative; width: 100%; height: clamp(180px,20vw,260px); }

/* ── LEADERBOARD PODIUM ── */
.leaderboard-podium {
  display: flex; justify-content: center; align-items: flex-end;
  gap: clamp(8px,2vw,20px); margin-bottom: var(--sp-lg); flex-wrap: wrap;
}
.podium-item { text-align: center; }
.podium-bar {
  width: clamp(60px,8vw,90px); border-radius: 6px 6px 0 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: #fff; font-size: var(--fs-md);
}
.podium-bar.p1 { background: linear-gradient(135deg,#b71c1c,var(--red)); height: clamp(70px,8vw,110px); }
.podium-bar.p2 { background: #757575; height: clamp(50px,6vw,80px); }
.podium-bar.p3 { background: #8D6E63; height: clamp(36px,4.5vw,60px); }
.podium-label { font-size: var(--fs-xs); color: var(--text-light); margin-top: 5px; max-width: clamp(60px,8vw,90px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.podium-amount { font-size: var(--fs-xs); color: var(--red); font-weight: 700; margin-top: 2px; }
.rank-1 td:first-child { color: var(--red); font-weight: 900; }
.rank-2 td:first-child { color: #757575; font-weight: 700; }
.rank-3 td:first-child { color: #8D6E63; font-weight: 700; }

/* ── SIDEBAR (stays dark, shared by employee + incentive) ── */
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 900; display: none; backdrop-filter: blur(3px);
}
.sidebar-overlay.open { display: block; }
.sidebar {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: min(460px,95vw);
  background: var(--black3); border-left: 1px solid var(--grey-border);
  z-index: 901; transform: translateX(100%); transition: transform 0.3s ease;
  overflow-y: auto; display: flex; flex-direction: column;
}
.sidebar.open { transform: translateX(0); }
.sidebar-header {
  background: var(--black); padding: var(--sp-md) var(--sp-lg);
  border-bottom: 2px solid var(--red);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.sidebar-name { font-size: var(--fs-lg); font-weight: 700; color: #fff; }
.sidebar-tag { font-size: var(--fs-xs); color: #888; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.sidebar-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--grey-dark); border: 1px solid var(--grey-border);
  color: #fff; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 18px; transition: all 0.2s; flex-shrink: 0;
}
.sidebar-close:hover { background: var(--red); border-color: var(--red); }
.sidebar-body { padding: var(--sp-md) var(--sp-lg); flex: 1; }
.sidebar-metric { margin-bottom: var(--sp-md); }
.sidebar-metric-label { font-size: var(--fs-xs); color: #888; letter-spacing: 1px; text-transform: uppercase; }
.sidebar-metric-value { font-size: var(--fs-xl); font-weight: 700; color: #fff; margin-top: 3px; }
.sidebar-section-title {
  font-size: var(--fs-xs); font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: #888;
  margin: var(--sp-md) 0 var(--sp-sm); border-bottom: 1px solid var(--grey-border); padding-bottom: 5px;
}
/* Dark tables inside sidebar */
.sidebar .table-wrap {
  box-shadow: none; border-color: var(--grey-border);
  max-height: 300px; /* shorter cap inside sidebar */
}
.sidebar table tbody tr { background: var(--black3); border-color: var(--grey-border); }
.sidebar table tbody tr:nth-child(even) { background: var(--grey-dark); }
.sidebar table tbody tr:hover { background: rgba(232,0,29,0.09); }
.sidebar table tbody td { color: var(--white-dim); }
.sidebar table tbody td.amount { color: #fff; }
.sidebar .chart-card { background: var(--grey-dark); border-color: var(--grey-border); }
.sidebar .total-row td {
  background: var(--black) !important;
  color: #fff !important;
}

/* ── BADGES ── */
.badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: var(--fs-xs); font-weight: 600; }
.badge-paid { background: rgba(46,125,50,0.14); color: #2E7D32; }
.badge-unpaid { background: var(--red-light); color: var(--red); }

/* ── LOADING ── */
.loading-state { display: flex; align-items: center; justify-content: center; padding: 80px; gap: 14px; color: var(--text-light); }
.spinner { width: 22px; height: 22px; border: 2px solid var(--surface-border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── NOTICE ── */
.data-notice {
  background: var(--surface-card); border: 1px solid var(--surface-border);
  border-left: 3px solid var(--red); border-radius: 8px;
  padding: var(--sp-sm) var(--sp-md); font-size: var(--fs-sm); color: var(--text-mid);
  margin-bottom: var(--sp-lg); display: flex; align-items: center; gap: 10px;
}
.data-notice .notice-icon { color: var(--red); font-size: 16px; flex-shrink: 0; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--red); }

/* ── RESPONSIVE ── */
@media (max-width:1024px) { .main { padding: var(--sp-md) var(--sp-lg); } }
@media (max-width:768px) {
  .header-main { gap: 10px; padding: 12px 16px; }
  .header-nav { padding: 10px 16px; gap: 8px; }
  .main { padding: 12px 14px; }
  .metric-grid { grid-template-columns: 1fr 1fr; }
  .chart-grid { grid-template-columns: 1fr; }
  .filter-bar { gap: 10px; }
  .filter-group { min-width: 100%; }
  .nav-btn { font-size: 9px; padding: 6px 10px; gap: 5px; }
}
@media (max-width:480px) {
  .header-main { flex-wrap: nowrap; padding: 10px 0 10px 12px; }
  .header-title { font-size: 16px; letter-spacing: 0.5px; }
  .header-subtitle { display: none; }
  .altus-logo { width: 90px; }
  .main { padding: 10px 10px; }
  .metric-grid { grid-template-columns: 1fr; }
  .metric-card .m-value { font-size: 20px; }
  table { font-size: 11px; }
  thead th { font-size: 9px; padding: 8px; }
  tbody td { padding: 8px; }
  .chart-container { height: 180px; }
  .sidebar { width: 100vw; }
  .nav-btn span.nav-label-text { display: none; }
}
@media (max-width:360px) { .header-title { font-size: 13px; } .altus-logo { width: 80px; } .main { padding: 8px; } }
@media (min-width:1440px) { .main { max-width: 1600px; margin: 0 auto; } }
@media print { .header { position: relative; } .sidebar, .sidebar-overlay { display: none !important; } body { background: white; } }
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<div class="header">
  <div class="header-main">

    <div class="header-title-block">
      <div class="header-title">Altus Corp Incentive Dashboard</div>
      <div class="header-subtitle">Real-Time Incentive Analytics &amp; Performance Intelligence</div>
    </div>

<script>

// ── HELPERS ───────────────────────────────────────────────────
const fmt = n => isNaN(n)||n===null ? '₹0' : '₹'+Number(n).toLocaleString('en-IN');
const toNum = v => parseFloat(v)||0;
const normName = n => (n||'').replace(/\s*\(Intern[^)]*\)/i,'').trim();

function getYTD(arr) {
  const yr = String(state.currentYear).slice(-2);
  return arr.filter(r => r.approved==='Yes' && r.month && r.month.slice(-2)===yr);
}
function sortMonths(arr) {
  return [...arr].sort((a,b)=>{
    const[ma,ya]=[a.slice(0,3),a.slice(4)],  [mb,yb]=[b.slice(0,3),b.slice(4)];
    return ya!==yb ? ya-yb : MONTHS_ORDER.indexOf(ma)-MONTHS_ORDER.indexOf(mb);
  });
}
function getMonths(pR,jR) {
  const s=new Set(); [...pR,...jR].forEach(r=>r.month&&s.add(r.month)); return sortMonths([...s]);
}

// ── CHARTS ───────────────────────────────────────────────────
const charts={};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function barChart(id,labels,datasets){
  destroyChart(id);const c=document.getElementById(id);if(!c)return;
  charts[id]=new Chart(c,{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#666',font:{family:'Arial',size:10}}}},
    scales:{
      x:{ticks:{color:'#888',font:{size:9},maxRotation:45},grid:{color:'rgba(0,0,0,0.05)'}},
      y:{ticks:{color:'#888',font:{size:9},callback:v=>'₹'+Number(v).toLocaleString('en-IN')},grid:{color:'rgba(0,0,0,0.07)'}}
    }}});
}
function pieChart(id,labels,data){
  destroyChart(id);const c=document.getElementById(id);if(!c)return;
  const clrs=['#E8001D','#555','#888','#bbb','#3D3D3D','#ff6666','#aaa','#666'];
  charts[id]=new Chart(c,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:clrs.slice(0,data.length),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{legend:{position:'right',labels:{color:'#555',font:{family:'Arial',size:9},boxWidth:10,padding:8}}}}});
}

// ── MULTI-SELECT (fixed: only close on outside click) ─────────
function createMultiSelect(options, placeholder, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'multi-select-wrapper';

  const trigger = document.createElement('div');
  trigger.className = 'multi-select-trigger';
  trigger.innerHTML = `<span class="ms-label">${placeholder}</span><span class="arrow">&#9660;</span>`;

  const dd = document.createElement('div');
  dd.className = 'multi-select-dropdown';

  function mkOpt(value, checked) {
    const div = document.createElement('div');
    div.className = 'multi-select-option'+(checked?' selected':'');
    const cb = document.createElement('input');
    cb.type='checkbox'; cb.value=value; cb.checked=checked;
    cb.style.pointerEvents='none';
    const sp = document.createElement('span'); sp.textContent=value;
    div.appendChild(cb); div.appendChild(sp);
    // Use mousedown so click doesn't bubble to document and close it
    div.addEventListener('mousedown', e => {
      e.preventDefault(); // prevent blur/close
      e.stopPropagation();
      handleMS(value, cb, dd, trigger, placeholder, onChange);
    });
    return div;
  }

  dd.appendChild(mkOpt('All', true));
  dd.appendChild(Object.assign(document.createElement('div'),{className:'multi-select-divider'}));
  options.forEach(o => dd.appendChild(mkOpt(o, false)));

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) { dd.classList.add('open'); trigger.classList.add('open'); }
  });

  wrap.appendChild(trigger); wrap.appendChild(dd);
  return wrap;
}

function handleMS(value, cb, dd, trigger, placeholder, onChange) {
  const allCb = dd.querySelector('[value="All"]');
  const others = [...dd.querySelectorAll('input[type=checkbox]')].filter(i=>i.value!=='All');
  if (value==='All') {
    const now = !allCb.checked;
    allCb.checked=now; allCb.closest('.multi-select-option').classList.toggle('selected',now);
    others.forEach(o=>{ o.checked=now; o.closest('.multi-select-option').classList.toggle('selected',now); });
  } else {
    cb.checked=!cb.checked; cb.closest('.multi-select-option').classList.toggle('selected',cb.checked);
    const anyOff = others.some(o=>!o.checked);
    allCb.checked=!anyOff; allCb.closest('.multi-select-option').classList.toggle('selected',!anyOff);
  }
  const sel = [...dd.querySelectorAll('input[type=checkbox]')].filter(i=>i.checked).map(i=>i.value);
  trigger.querySelector('.ms-label').textContent =
    sel.includes('All') ? placeholder :
    sel.length===0 ? placeholder :
    sel.length===1 ? sel[0] : sel.length+' selected';
  onChange(sel.length===0?['All']:sel);
  // Do NOT close — stays open until outside click
}

function closeAllDropdowns() {
  document.querySelectorAll('.multi-select-dropdown.open').forEach(d=>{
    d.classList.remove('open');
    if(d.previousElementSibling) d.previousElementSibling.classList.remove('open');
  });
}
// Only close on genuine outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.multi-select-wrapper')) closeAllDropdowns();
});

function filterPerm() {

function filterProj() {

  const ed={};

    if(i){if(!ed[i])ed[i]={ytd:0,bm:{},paid:0,unpaid:0};ed[i].ytd+=toNum(r.internAmount);ed[i].bm[r.month]=(ed[i].bm[r.month]||0)+toNum(r.internAmount);ed[i].paid+=toNum(r.internPaid);ed[i].unpaid+=toNum(r.internUnpaid);}
  });
  let hdr=`<thead><tr><th>Employee Name</th><th>YTD Total</th>`;ms.forEach(m=>{hdr+=`<th>${m}</th>`;});hdr+=`<th>Paid</th><th>Unpaid</th></tr></thead>`;
  let rows='',totYTD=0,totPaid=0,totUnpaid=0;const totBM={};ms.forEach(m=>totBM[m]=0);
  Object.entries(ed).filter(([,d])=>d.ytd>0||d.paid>0).sort((a,b)=>b[1].ytd-a[1].ytd).forEach(([name,d])=>{

  const ms=getMonths(pR,jR);
  const nd={'Project Based Incentive':{ytd:0,bm:{},paid:0,unpaid:0}};
  jR.forEach(r=>{const v=toNum(r.empAmount)+toNum(r.internAmount);nd['Project Based Incentive'].ytd+=v;nd['Project Based Incentive'].bm[r.month]=(nd['Project Based Incentive'].bm[r.month]||0)+v;nd['Project Based Incentive'].paid+=toNum(r.empPaid)+toNum(r.internPaid);nd['Project Based Incentive'].unpaid+=toNum(r.empUnpaid)+toNum(r.internUnpaid);});
  pR.forEach(r=>{const n=r.incentiveName;if(!n)return;if(!nd[n])nd[n]={ytd:0,bm:{},paid:0,unpaid:0};nd[n].ytd+=toNum(r.approvedAmt);nd[n].bm[r.month]=(nd[n].bm[r.month]||0)+toNum(r.approvedAmt);nd[n].paid+=toNum(r.paidAmt);nd[n].unpaid+=toNum(r.unpaid);});

  const pj='Project Based Incentive';
  const names=[pj,...Object.keys(nd).filter(n=>n!==pj).sort()];
  let rows='',totYTD=0,totPaid=0,totUnpaid=0;const totBM={};ms.forEach(m=>totBM[m]=0);
  names.forEach(name=>{const d=nd[name];if(!d||d.ytd===0)return;totYTD+=d.ytd;totPaid+=d.paid;totUnpaid+=d.unpaid;
    const mc=ms.map(m=>{totBM[m]=(totBM[m]||0)+(d.bm[m]||0);return`<td class="amount">${d.bm[m]?fmt(d.bm[m]):'—'}</td>`;}).join('');
    rows+=`<tr><td><span class="clickable-name" onclick="openIncentiveSidebar('${name.replace(/'/g,"\\'")}');event.stopPropagation()">${name}</span></td><td class="amount">${fmt(d.ytd)}</td>${mc}<td class="green">${fmt(d.paid)}</td><td class="red-text">${fmt(d.unpaid)}</td></tr>`;
  });
  const totMC=ms.map(m=>`<td class="amount">${fmt(totBM[m])}</td>`).join('');
  rows+=`<tr class="total-row"><td><b>TOTAL</b></td><td class="amount">${fmt(totYTD)}</td>${totMC}<td class="amount">${fmt(totPaid)}</td><td class="amount">${fmt(totUnpaid)}</td></tr>`;
  const tw=document.createElement('div');tw.className='table-wrap';tw.innerHTML=`<table>${hdr}<tbody>${rows}</tbody></table>`;
  f.appendChild(tw);return f;
}

// ── S7 LEADERBOARD ────────────────────────────────────────────
function renderLeaderboard() {
  const f=document.createDocumentFragment();
  f.appendChild(mkSH('Incentive Leaderboard'));
  const yr=String(state.currentYear).slice(-2);
  const pR=state.permData.filter(r=>r.approved==='Yes'&&r.month&&r.month.slice(-2)===yr);
  const jR=state.projData.filter(r=>r.approved==='Yes'&&r.month&&r.month.slice(-2)===yr);
  const ms=['All',...getMonths(pR,jR)];
  const fb=document.createElement('div');fb.className='filter-bar';
  fb.innerHTML=`<div class="filter-group"><div class="filter-label">Leaderboard Period</div>
    <select class="filter-select" id="lbFilter" onchange="updateLB()">
      ${ms.map(m=>`<option value="${m}">${m==='All'?'YTD — All Months':m}</option>`).join('')}
    </select></div>`;
  f.appendChild(fb);
  const pd=document.createElement('div');pd.id='lbPodium';f.appendChild(pd);
  const tw=document.createElement('div');tw.className='table-wrap';
  tw.innerHTML=`<table><thead><tr><th>Rank</th><th>Employee Name</th><th>YTD Amount</th><th>Share</th></tr></thead><tbody id="lbTbody"></tbody></table>`;
  f.appendChild(tw);
  setTimeout(()=>updateLB(),80);
  return f;
}

function updateLB() {
  const sel=document.getElementById('lbFilter');const period=sel?sel.value:'All';
  const yr=String(state.currentYear).slice(-2);
  let pR=state.permData.filter(r=>r.approved==='Yes'&&r.month&&r.month.slice(-2)===yr);
  let jR=state.projData.filter(r=>r.approved==='Yes'&&r.month&&r.month.slice(-2)===yr);
  if(period!=='All'){pR=pR.filter(r=>r.month===period);jR=jR.filter(r=>r.month===period);}
  const byEmp={};
  pR.forEach(r=>{const n=normName(r.empName);if(n)byEmp[n]=(byEmp[n]||0)+toNum(r.approvedAmt);});
  jR.forEach(r=>{if(r.supervisor)byEmp[r.supervisor]=(byEmp[r.supervisor]||0)+toNum(r.empAmount);const n=normName(r.intern);if(n)byEmp[n]=(byEmp[n]||0)+toNum(r.internAmount);});
  const sorted=Object.entries(byEmp).sort((a,b)=>b[1]-a[1]);
  const grandTotal=sorted.reduce((s,[,v])=>s+v,0);
  const pd=document.getElementById('lbPodium');
  if(pd&&sorted.length>=1){
    const top=[sorted[1]||['—',0],sorted[0]||['—',0],sorted[2]||['—',0]];
    pd.innerHTML=`<div class="leaderboard-podium">${top.map((e,i)=>`<div class="podium-item"><div class="podium-bar ${['p2','p1','p3'][i]}">${['2','1','3'][i]}</div><div class="podium-label">${e[0]}</div><div class="podium-amount">${fmt(e[1])}</div></div>`).join('')}</div>`;
  }
  const tb=document.getElementById('lbTbody');if(!tb)return;tb.innerHTML='';
  sorted.forEach(([name,amt],i)=>{
    const pct=grandTotal>0?((amt/grandTotal)*100).toFixed(1):'0.0';
    const tr=document.createElement('tr');tr.className=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    tr.innerHTML=`<td><b>#${i+1}</b></td>
      <td><span class="clickable-name" onclick="openEmployeeSidebar('${name.replace(/'/g,"\\'")}');event.stopPropagation()">${name}</span></td>
      <td class="amount">${fmt(amt)}</td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <div style="height:5px;background:var(--red);border-radius:3px;width:${pct}%;min-width:2px;max-width:100px"></div>
        <span style="font-size:10px;color:var(--text-light);white-space:nowrap">${pct}%</span>
      </div></td>`;
    tb.appendChild(tr);
  });
}

// ── SIDEBAR OPEN/CLOSE ────────────────────────────────────────
function openSidebarBase(title, tag) {
  document.getElementById('sidebarTitle').textContent = title;
  document.getElementById('sidebarTag').textContent = tag;
  document.getElementById('sidebarContent').innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading…</div>';
  document.getElementById('sidebarOverlay').classList.add('open');
  document.getElementById('mainSidebar').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('mainSidebar').classList.remove('open');
}

// ── EMPLOYEE SIDEBAR ──────────────────────────────────────────
function openEmployeeSidebar(name) {
  if(!name) return;
  openSidebarBase(name, 'Employee Profile');
  const yr=String(state.currentYear).slice(-2);
  const pR=state.permData.filter(r=>r.approved==='Yes'&&normName(r.empName)===name&&r.month&&r.month.slice(-2)===yr);
  const jR=state.projData.filter(r=>r.approved==='Yes'&&r.month&&r.month.slice(-2)===yr&&(r.supervisor===name||normName(r.intern)===name));
  const pTot=pR.reduce((s,r)=>s+toNum(r.approvedAmt),0);
  const jTot=jR.reduce((s,r)=>s+(r.supervisor===name?toNum(r.empAmount):toNum(r.internAmount)),0);
  const ytd=pTot+jTot;
  const paid=pR.reduce((s,r)=>s+toNum(r.paidAmt),0)+jR.reduce((s,r)=>s+(r.supervisor===name?toNum(r.empPaid):toNum(r.internPaid)),0);

  const sc=document.getElementById('sidebarContent');
  sc.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px">
      <div class="sidebar-metric"><div class="sidebar-metric-label">YTD Total</div><div class="sidebar-metric-value">${fmt(ytd)}</div></div>
      <div class="sidebar-metric"><div class="sidebar-metric-label">Permanent</div><div class="sidebar-metric-value">${fmt(pTot)}</div></div>
      <div class="sidebar-metric"><div class="sidebar-metric-label" style="color:#4CAF50">Paid</div><div class="sidebar-metric-value" style="color:#4CAF50">${fmt(paid)}</div></div>
      <div class="sidebar-metric"><div class="sidebar-metric-label" style="color:var(--red)">Unpaid</div><div class="sidebar-metric-value" style="color:var(--red)">${fmt(ytd-paid)}</div></div>
    </div>
    ${pR.length?`
      <div class="sidebar-section-title">Permanent Incentives</div>
      <div class="chart-card" style="padding:12px;margin-bottom:12px"><div style="height:150px"><canvas id="sbPermChart"></canvas></div></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Incentive</th><th>Month</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>${pR.map(r=>`<tr>
          <td>${r.incentiveName}</td><td>${r.month}</td>
          <td class="amount">${fmt(r.approvedAmt)}</td>
          <td><span class="badge ${toNum(r.paidAmt)>0?'badge-paid':'badge-unpaid'}">${toNum(r.paidAmt)>0?'PAID':'UNPAID'}</span></td>
        </tr>`).join('')}
        <tr class="total-row"><td colspan="2"><b>TOTAL</b></td><td class="amount">${fmt(pTot)}</td><td></td></tr>
        </tbody></table></div>`:''}
    ${jR.length?`
      <div class="sidebar-section-title">Project Incentives</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Project</th><th>Month</th><th>Amount</th><th>Role</th></tr></thead>
        <tbody>${jR.map(r=>{const isSup=r.supervisor===name;return`<tr>
          <td>${r.project}</td><td>${r.month}</td>
          <td class="amount">${fmt(isSup?r.empAmount:r.internAmount)}</td>
          <td><span class="badge badge-paid">${isSup?'Supervisor':'Intern'}</span></td>
        </tr>`;}).join('')}
        <tr class="total-row"><td colspan="2"><b>TOTAL</b></td><td class="amount">${fmt(jTot)}</td><td></td></tr>
        </tbody></table></div>`:''}
    ${!pR.length&&!jR.length?`<div style="color:#888;text-align:center;padding:40px 0">No incentive data found for <b>${name}</b> in ${state.currentYear}</div>`:''}
  `;
  if(pR.length){
    setTimeout(()=>{
      const bm={};pR.forEach(r=>{bm[r.month]=(bm[r.month]||0)+toNum(r.approvedAmt);});
      barChart('sbPermChart',Object.keys(bm),[{label:'Incentive',data:Object.values(bm),backgroundColor:'#E8001D',borderRadius:3}]);
    },100);
  }
}

// ── INCENTIVE NAME SIDEBAR ────────────────────────────────────
function openIncentiveSidebar(incentiveName) {
  if(!incentiveName) return;
  openSidebarBase(incentiveName, 'Incentive Details');
  const yr=String(state.currentYear).slice(-2);

  // For project based, aggregate from proj data
  const isProj = incentiveName === 'Project Based Incentive';
  let rows=[];
  if(isProj){
    // Flatten proj into pseudo-rows per person
    state.projData.filter(r=>r.approved==='Yes'&&r.month&&r.month.slice(-2)===yr).forEach(r=>{
      if(r.supervisor&&toNum(r.empAmount)>0)  rows.push({empName:r.supervisor,          month:r.month,amount:toNum(r.empAmount),  paidAmt:toNum(r.empPaid)});
      const n=normName(r.intern);
      if(n&&toNum(r.internAmount)>0)          rows.push({empName:n,                     month:r.month,amount:toNum(r.internAmount),paidAmt:toNum(r.internPaid)});
    });
  } else {
    rows=state.permData.filter(r=>r.approved==='Yes'&&r.incentiveName===incentiveName&&r.month&&r.month.slice(-2)===yr)
      .map(r=>({empName:normName(r.empName),month:r.month,amount:toNum(r.approvedAmt),paidAmt:toNum(r.paidAmt)}));
  }

  // Aggregate by employee
  const byEmp={};
  rows.forEach(r=>{
    if(!byEmp[r.empName]) byEmp[r.empName]={total:0,paid:0,entries:[]};
    byEmp[r.empName].total+=r.amount;
    byEmp[r.empName].paid+=r.paidAmt;
    byEmp[r.empName].entries.push(r);
  });
  const empList=Object.entries(byEmp).sort((a,b)=>b[1].total-a[1].total);
  const grandTotal=empList.reduce((s,[,d])=>s+d.total,0);
  const grandPaid=empList.reduce((s,[,d])=>s+d.paid,0);
  const empCount=empList.length;

  const sc=document.getElementById('sidebarContent');
  sc.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px">
      <div class="sidebar-metric"><div class="sidebar-metric-label">Total Amount</div><div class="sidebar-metric-value">${fmt(grandTotal)}</div></div>
      <div class="sidebar-metric"><div class="sidebar-metric-label">Employees</div><div class="sidebar-metric-value">${empCount}</div></div>
      <div class="sidebar-metric"><div class="sidebar-metric-label" style="color:#4CAF50">Total Paid</div><div class="sidebar-metric-value" style="color:#4CAF50">${fmt(grandPaid)}</div></div>
      <div class="sidebar-metric"><div class="sidebar-metric-label" style="color:var(--red)">Total Unpaid</div><div class="sidebar-metric-value" style="color:var(--red)">${fmt(grandTotal-grandPaid)}</div></div>
    </div>

    ${empCount>0?`
    <div class="chart-card" style="padding:12px;margin-bottom:12px">
      <div style="color:#888;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Amount Per Employee</div>
      <div style="height:150px"><canvas id="sbIncChart"></canvas></div>
    </div>

    <div class="sidebar-section-title">Employee Breakdown</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Employee Name</th><th>Month</th><th>Amount</th><th>Status</th></tr></thead>
      <tbody>
        ${empList.map(([name,d])=>
          d.entries.map(e=>`<tr>
            <td><span style="color:#E8001D;cursor:pointer" onclick="openEmployeeSidebar('${name.replace(/'/g,"\\'")}');event.stopPropagation()">${name}</span></td>
            <td>${e.month}</td>
            <td class="amount">${fmt(e.amount)}</td>
            <td><span class="badge ${e.paidAmt>0?'badge-paid':'badge-unpaid'}">${e.paidAmt>0?'PAID':'UNPAID'}</span></td>
          </tr>`).join('')
        ).join('')}
      </tbody>
    </table></div>

    <div class="sidebar-section-title">Total Per Employee</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Employee</th><th>Total</th><th>Paid</th><th>Unpaid</th></tr></thead>
      <tbody>
        ${empList.map(([name,d])=>`<tr>
          <td><span style="color:#E8001D;cursor:pointer" onclick="openEmployeeSidebar('${name.replace(/'/g,"\\'")}');event.stopPropagation()">${name}</span></td>
          <td class="amount">${fmt(d.total)}</td>
          <td class="green">${fmt(d.paid)}</td>
          <td class="red-text">${fmt(d.total-d.paid)}</td>
        </tr>`).join('')}
        <tr class="total-row"><td><b>TOTAL</b></td><td class="amount">${fmt(grandTotal)}</td><td class="amount">${fmt(grandPaid)}</td><td class="amount">${fmt(grandTotal-grandPaid)}</td></tr>
      </tbody>
    </table></div>`
    :`<div style="color:#888;text-align:center;padding:40px 0">No data found for <b>${incentiveName}</b> in ${state.currentYear}</div>`}
  `;

  if(empCount>0){
    setTimeout(()=>{
      barChart('sbIncChart',
        empList.map(([n])=>n),
        [{label:'Amount',data:empList.map(([,d])=>d.total),backgroundColor:'#E8001D',borderRadius:3}]
      );
    },100);
  }
}

function initCharts(){updatePerm();updateProj();initConsolidatedChart();updateLB();}
loadData();
</script>
