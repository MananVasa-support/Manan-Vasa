<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Altus Corp — Task Management Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{
  --red:#e50000;--red-dark:#b50000;--red-pale:#fff0f0;
  --black:#0a0a0a;--cream:#fafafa;--text:#111;--muted:#666;
  --border:rgba(0,0,0,0.08);
  --green:#15803d;--blue:#1d4ed8;--purple:#9d4edd;--amber:#c2410c;
}
body{font-family:Arial,sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* PAGE */
.page-wrap{
  min-height:100vh;
  background:linear-gradient(160deg,#0a0a0a 0%,#1a0000 40%,#0a0a0a 100%);
  padding:0 0 5rem;position:relative;overflow-x:clip;
}
.page-wrap::before{
  content:'';position:absolute;top:-120px;right:-120px;width:500px;height:500px;
  border-radius:50%;background:radial-gradient(circle,rgba(229,0,0,0.13) 0%,transparent 70%);
  pointer-events:none;
}

/* HEADER */
.site-header{
  background:linear-gradient(135deg,#0a0a0a 0%,#1e0000 100%);
  border-bottom:1px solid rgba(229,0,0,0.2);padding:2rem 2.5rem 1.8rem;position:relative;
}
.site-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--red),#ff4444,var(--red),transparent);
}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;}
.header-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--red);margin-bottom:6px;}
.header-title{font-size:36px;font-weight:900;color:#fff;line-height:1;}
.header-sub{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px;}
.header-logo{width:90px;height:90px;object-fit:contain;flex-shrink:0;}

/* CONTROLS */
.controls-bar{
  max-width:1400px;margin:1.4rem auto 0;padding:0 1.5rem;
  display:flex;align-items:flex-end;gap:1.2rem;flex-wrap:wrap;
}
.ctrl-group{display:flex;flex-direction:column;gap:5px;}
.ctrl-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);}

/* Multi-select */
.ms-wrapper{position:relative;}
.ms-trigger{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  min-width:250px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(229,0,0,0.25);border-radius:10px;
  padding:10px 16px;color:#fff;cursor:pointer;
  font-size:14px;font-weight:600;font-family:Arial,sans-serif;
  transition:border-color 0.15s;
}
.ms-trigger:hover{border-color:rgba(229,0,0,0.55);}
.ms-trigger svg{flex-shrink:0;opacity:0.55;transition:transform 0.2s;}
.ms-wrapper.open .ms-trigger svg{transform:rotate(180deg);}
.ms-panel{
  display:none;position:absolute;top:calc(100% + 6px);left:0;min-width:270px;
  background:#110000;border:1px solid rgba(229,0,0,0.3);border-radius:12px;
  z-index:200;max-height:360px;overflow-y:auto;
  box-shadow:0 12px 40px rgba(0,0,0,0.7);
}
.ms-panel.open{display:block;}
.ms-option{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background 0.1s;}
.ms-option:hover{background:rgba(229,0,0,0.12);}
.ms-option label{cursor:pointer;font-size:14px;color:#fff;flex:1;}
.ms-option.all-opt{border-bottom:1px solid rgba(229,0,0,0.2);}
.ms-option.all-opt label{font-weight:700;color:#fff;}
.ms-option input[type=checkbox]{cursor:pointer;width:15px;height:15px;accent-color:var(--red);flex-shrink:0;}
.ms-group-label{
  padding:10px 16px 3px;font-size:10px;font-weight:800;letter-spacing:0.12em;
  color:rgba(229,0,0,0.6);text-transform:uppercase;
  border-top:1px solid rgba(229,0,0,0.12);
}

.refresh-btn{
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.75);
  border:1px solid rgba(229,0,0,0.22);border-radius:10px;padding:10px 20px;
  font-family:Arial,sans-serif;font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:all 0.2s;
}
.refresh-btn:hover{border-color:var(--red);color:#fff;background:rgba(229,0,0,0.12);}
.refresh-btn svg{transition:transform 0.7s;}
.refresh-btn.spinning svg{transform:rotate(360deg);}

/* PERIOD INFO */
.period-info{
  max-width:1400px;margin:0.5rem auto 0;padding:0.4rem 1.5rem;
  font-size:13px;font-weight:500;color:rgba(255,255,255,0.4);
}

/* CONTENT */
.content{max-width:1400px;margin:1.6rem auto 0;padding:0 1.5rem;display:flex;flex-direction:column;gap:1.6rem;}

/* STATS */
.stats-row{
  display:grid;grid-template-columns:repeat(6,1fr);gap:1px;
  background:rgba(229,0,0,0.08);border-radius:16px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(229,0,0,0.12);
}
.stat-box{background:#111;padding:1.1rem 1.3rem;display:flex;flex-direction:column;gap:4px;}
.stat-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.42);}
.stat-val{font-size:34px;font-weight:900;color:#fff;line-height:1;}
.stat-val.green{color:#4ade80;}.stat-val.blue{color:#60a5fa;}
.stat-val.purple{color:#c084fc;}.stat-val.red2{color:#f87171;}
.stat-val.amber{color:#fb923c;}

/* CARD */
.dash-card{
  background:var(--cream);border-radius:16px;overflow:visible;
  box-shadow:0 16px 48px rgba(0,0,0,0.45),0 0 0 1px rgba(229,0,0,0.12);
}
.card-head{
  background:#0a0a0a;padding:1rem 1.4rem;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(229,0,0,0.18);
  border-radius:16px 16px 0 0;position:sticky;top:0;z-index:30;
}
.card-head-left{display:flex;align-items:center;gap:10px;}
.card-dot{width:8px;height:8px;border-radius:50%;background:var(--red);}
.card-title{font-size:13px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.75);}
.card-badge{font-size:12px;font-weight:600;color:var(--red);background:rgba(229,0,0,0.1);border:1px solid rgba(229,0,0,0.2);border-radius:20px;padding:4px 14px;}

/* TABLE WRAP — scrollable, sticky headers work inside */
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:65vh;border-radius:0 0 16px 16px;}

/* TABLE */
.all-table table{width:100%;border-collapse:collapse;min-width:920px;}

/* Sticky thead — two rows */
.all-table thead{position:sticky;top:0;z-index:20;}
.all-table thead tr.th-main{background:#0e0e0e;}
.all-table thead tr.th-main th{
  font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
  color:rgba(255,255,255,0.7);padding:13px 11px;text-align:center;white-space:nowrap;
  border-bottom:1px solid rgba(229,0,0,0.15);border-right:1px solid rgba(255,255,255,0.04);
}
.all-table thead tr.th-main th.name-col{text-align:left;min-width:110px;max-width:140px;padding-left:16px;}
/* Pending header = BRIGHT RED */
.all-table thead tr.th-main th.pending-hdr{
  background:#c80000 !important;color:#fff !important;
  border-bottom:2px solid #ff3333 !important;font-size:11px;font-weight:800;
}
.all-table thead tr.th-sub{background:#1a0000;}
.all-table thead tr.th-sub th{
  font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
  color:rgba(255,255,255,0.5);
  padding:7px 11px;text-align:center;white-space:nowrap;
  border-bottom:2px solid rgba(229,0,0,0.3);border-right:1px solid rgba(255,255,255,0.04);
}
.all-table thead tr.th-sub th.pending-hdr{
  background:#c80000 !important;color:#ffcccc !important;
}

/* BODY */
.all-table tbody tr{border-bottom:1px solid rgba(0,0,0,0.07);transition:background 0.1s;}
.all-table tbody tr:nth-child(even){background:#f5f5f5;}
.all-table tbody tr:hover{background:#ffeaea !important;}
.all-table tbody td{
  padding:12px 11px;white-space:nowrap;text-align:center;
  font-size:15px;font-weight:600;border-right:1px solid rgba(0,0,0,0.04);
}
/* Narrow employee name column */
.all-table tbody td.name-cell{
  text-align:left;font-weight:700;font-size:14px;color:#111;
  max-width:140px;min-width:100px;overflow:hidden;text-overflow:ellipsis;
  padding-left:16px;
}
.all-table tbody td.num-cell{font-size:18px;font-weight:800;color:#111;}
.all-table tbody td.zero{color:#ccc;font-weight:400;font-size:13px;}
.all-table tbody td.pending-grp{background:rgba(200,0,0,0.04);}
.all-table tbody tr:nth-child(even) td.pending-grp{background:rgba(200,0,0,0.07);}
.all-table tbody tr.no-data-row{opacity:0.4;}

/* FOOT — sticky at bottom */
.all-table tfoot{position:sticky;bottom:0;z-index:20;}
.all-table tfoot tr{border-top:2px solid var(--red);}
.all-table tfoot td{
  background:#111;font-weight:800;font-size:14px;padding:13px 11px;
  text-align:center;color:#fff;border-right:1px solid rgba(255,255,255,0.07);white-space:nowrap;
}
.all-table tfoot td.name-cell{
  text-align:left;font-size:12px;letter-spacing:0.08em;
  text-transform:uppercase;padding-left:16px;
}

/* STATE */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:1rem;}
.state-icon{font-size:36px;}
.state-title{font-weight:700;font-size:16px;}
.state-sub{font-size:13px;color:var(--muted);text-align:center;max-width:360px;}
.zero{color:#bbb;font-weight:400;}

@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(3,1fr);}
  .header-title{font-size:26px;}
  .controls-bar,.content{padding:0 1rem;}
}
@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .site-header{padding:1.5rem 1.25rem;}
}
</style>
</head>
<body>
<div class="page-wrap">

<!-- HEADER -->
<div class="site-header">
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">Altus Corp</div>
      <div class="header-title">Task Management Dashboard</div>
      <div class="header-sub">Employee task tracking · Status breakdown · Live from Backend sheet</div>
    </div>
    <img class="header-logo" src="Altus Corp Black font.png" alt="" onerror="this.style.display='none'"/>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls-bar">
  <div class="ctrl-group">
    <span class="ctrl-label">Employee</span>
    <div class="ms-wrapper" id="ms-wrapper">
      <button class="ms-trigger" id="ms-trigger" onclick="toggleMS(event)">
        <span id="ms-label">All Employees</span>
        <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
          <path d="M1 1l5 5 5-5" stroke="#aaa" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="ms-panel" id="ms-panel"></div>
    </div>
  </div>

  <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Refresh
  </button>
</div>

<div class="period-info" id="period-info"></div>

<!-- CONTENT -->
<div class="content">

  <div class="stats-row">
    <div class="stat-box"><div class="stat-label">Total Tasks</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat-box"><div class="stat-label">Approved</div><div class="stat-val green" id="s-approved">—</div></div>
    <div class="stat-box"><div class="stat-label">Done</div><div class="stat-val blue" id="s-done">—</div></div>
    <div class="stat-box"><div class="stat-label">Pending</div><div class="stat-val purple" id="s-pending">—</div></div>
    <div class="stat-box"><div class="stat-label">Cancelled</div><div class="stat-val red2" id="s-cancelled">—</div></div>
    <div class="stat-box"><div class="stat-label">Transferred</div><div class="stat-val amber" id="s-transferred">—</div></div>
  </div>

  <div class="dash-card">
    <div class="card-head">
      <div class="card-head-left">
        <div class="card-dot"></div>
        <div class="card-title">Task Status</div>
      </div>
      <div class="card-badge" id="table-badge">Loading…</div>
    </div>
    <div class="table-wrap" id="main-wrap">
      <div class="state-box">
        <div class="state-icon">⏳</div>
        <div class="state-title">Loading data…</div>
        <div class="state-sub">Connecting to Backend sheet.</div>
      </div>
    </div>
  </div>

</div>
</div><!-- /page-wrap -->

<script>
// ═══════════════════════════════════════════════════════════════
//  ALTUS CORP — Task Dashboard  |  Source: Backend sheet
// ═══════════════════════════════════════════════════════════════

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlrPIN5j9YWy8YpgAMJ07fLvKReXeaQYTLfzyJfwDSgRj_a-I5T1ssHqfdY8nmisDE_g/exec';

let allEmployeeData = [];
let empList         = [];
let checkedEmps     = new Set();

const EMP_FIRST  = ['manan vasa'];
const EMP_BOTTOM = ['dattaram kap', 'parvez khan'];

// ── Sort employees ───────────────────────────────────────────
function sortEmployees(arr) {
  const first = [], regular = [], interns = [], bottom = [];
  arr.forEach(emp => {
    const lo = emp.toLowerCase();
    if (EMP_FIRST.some(f  => lo.includes(f)))  { first.push(emp);   return; }
    if (EMP_BOTTOM.some(b => lo.includes(b)))  { bottom.push(emp);  return; }
    if (lo.includes('intern'))                  { interns.push(emp); return; }
    regular.push(emp);
  });
  return [
    ...first,
    ...regular.sort((a,b) => a.localeCompare(b)),
    ...interns.sort((a,b) => a.localeCompare(b)),
    ...bottom
  ];
}

// ── Multi-select ─────────────────────────────────────────────
function toggleMS(e) {
  e.stopPropagation();
  const wrapper = document.getElementById('ms-wrapper');
  const panel   = document.getElementById('ms-panel');
  const isOpen  = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  wrapper.classList.toggle('open', !isOpen);
}
document.addEventListener('click', e => {
  if (!document.getElementById('ms-wrapper').contains(e.target)) {
    document.getElementById('ms-panel').classList.remove('open');
    document.getElementById('ms-wrapper').classList.remove('open');
  }
});

function safeid(name) { return 'e_' + name.replace(/[^a-z0-9]/gi, '_'); }

function buildDropdown() {
  empList     = sortEmployees(allEmployeeData.map(e => e.name));
  checkedEmps = new Set(empList);

  const regulars = empList.filter(e => {
    const lo = e.toLowerCase();
    return !lo.includes('intern') && !EMP_BOTTOM.some(b => lo.includes(b));
  });
  const interns = empList.filter(e => e.toLowerCase().includes('intern'));
  const bottoms = empList.filter(e => EMP_BOTTOM.some(b => e.toLowerCase().includes(b)));

  let html = `<div class="ms-option all-opt">
    <input type="checkbox" id="chk-all" checked onchange="toggleAll(this)">
    <label for="chk-all">All Employees</label>
  </div>`;

  if (regulars.length) {
    html += `<div class="ms-group-label">Employees</div>`;
    regulars.forEach(e => { html += msOpt(e); });
  }
  if (interns.length) {
    html += `<div class="ms-group-label">Interns</div>`;
    interns.forEach(e => { html += msOpt(e); });
  }
  if (bottoms.length) {
    bottoms.forEach(e => { html += msOpt(e); });
  }

  document.getElementById('ms-panel').innerHTML = html;
}

function msOpt(name) {
  const id = safeid(name);
  return `<div class="ms-option">
    <input type="checkbox" id="${id}" value="${esc(name)}" checked onchange="toggleEmp(this)">
    <label for="${id}">${esc(name)}</label>
  </div>`;
}

function toggleAll(el) {
  if (!el.checked) { el.checked = true; return; } // can't deselect all
  empList.forEach(name => {
    const chk = document.getElementById(safeid(name));
    if (chk) chk.checked = true;
  });
  checkedEmps = new Set(empList);
  updateLabel(); render();
}

function toggleEmp(el) {
  const name = el.value;
  if (el.checked) checkedEmps.add(name);
  else            checkedEmps.delete(name);
  if (checkedEmps.size === 0) {
    checkedEmps = new Set(empList);
    empList.forEach(n => { const c = document.getElementById(safeid(n)); if(c) c.checked=true; });
    document.getElementById('chk-all').checked = true;
  } else {
    document.getElementById('chk-all').checked = checkedEmps.size === empList.length;
  }
  updateLabel(); render();
}

function updateLabel() {
  const n = checkedEmps.size, t = empList.length;
  let lbl;
  if (n === 0 || n === t)  lbl = 'All Employees';
  else if (n === 1)        lbl = [...checkedEmps][0];
  else                     lbl = n + ' employees selected';
  document.getElementById('ms-label').textContent = lbl;
}

function getDisplayEmps() {
  if (checkedEmps.size === 0 || checkedEmps.size === empList.length) return empList;
  return empList.filter(n => checkedEmps.has(n));
}

// ── Data helper ──────────────────────────────────────────────
function getEmpData(name) {
  return allEmployeeData.find(e => e.name === name) || null;
}

// ── Stats ────────────────────────────────────────────────────
function updateStats() {
  const display = getDisplayEmps();
  const t = { Total:0, Approved:0, Done:0, Pending:0, Cancelled:0, Transferred:0 };
  display.forEach(name => {
    const e = getEmpData(name);
    if (!e) return;
    Object.keys(t).forEach(k => t[k] += (e[k] || 0));
  });
  document.getElementById('s-total').textContent       = t.Total       || '—';
  document.getElementById('s-approved').textContent    = t.Approved    || '—';
  document.getElementById('s-done').textContent        = t.Done        || '—';
  document.getElementById('s-pending').textContent     = t.Pending     || '—';
  document.getElementById('s-cancelled').textContent   = t.Cancelled   || '—';
  document.getElementById('s-transferred').textContent = t.Transferred || '—';
}

// ── Period info ──────────────────────────────────────────────
function updatePeriodInfo() {
  const display  = getDisplayEmps();
  const total    = display.reduce((s,n) => s + ((getEmpData(n)||{}).Total||0), 0);
  const isAll    = display.length === empList.length;
  document.getElementById('period-info').textContent =
    `Showing: ${isAll ? 'All' : display.length} employee${display.length!==1?'s':''} · ${total} total tasks · Source: Backend sheet`;
}

// ── Table render ─────────────────────────────────────────────
function v(n)  { return n > 0 ? n : '<span class="zero">—</span>'; }
function vp(n) {
  return n > 0
    ? `<td class="pending-grp">${n}</td>`
    : `<td class="pending-grp zero"><span class="zero">—</span></td>`;
}

function renderTable() {
  const display = getDisplayEmps();
  const wrap    = document.getElementById('main-wrap');
  const badge   = document.getElementById('table-badge');

  if (!display.length) {
    wrap.innerHTML = `<div class="state-box"><div class="state-icon">👤</div><div class="state-title">No employees selected</div></div>`;
    badge.textContent = '—'; return;
  }

  const totalTasks = display.reduce((s,n)=>s+((getEmpData(n)||{}).Total||0), 0);
  badge.textContent = display.length + ' employee' + (display.length!==1?'s':'') + ' · ' + totalTasks + ' tasks';

  // Compute totals row
  const tot = {Approved:0,'Not Approved':0,Done:0,Transferred:0,Cancelled:0,
               Pending:0,'Need Help':0,'Follow Up':0,Initiated:0,'Not Started':0,Total:0};
  display.forEach(n => {
    const e = getEmpData(n); if(!e) return;
    Object.keys(tot).forEach(k => tot[k] += (e[k]||0));
  });

  let html = `<div class="all-table"><table>
  <thead>
    <tr class="th-main">
      <th rowspan="2" class="name-col">Employee</th>
      <th rowspan="2">Approved</th>
      <th rowspan="2">Not Approved</th>
      <th rowspan="2">Done</th>
      <th rowspan="2">Transferred</th>
      <th rowspan="2">Cancelled</th>
      <th colspan="5" class="pending-hdr">⏳ Pending</th>
      <th rowspan="2">Total</th>
    </tr>
    <tr class="th-sub">
      <th class="pending-hdr">Total</th>
      <th class="pending-hdr">Need Help</th>
      <th class="pending-hdr">Follow Up</th>
      <th class="pending-hdr">Initiated</th>
      <th class="pending-hdr">Not Started</th>
    </tr>
  </thead>
  <tbody>`;

  display.forEach((name, i) => {
    const e = getEmpData(name);
    const c = e || {};
    const hasData = e && e.Total > 0;
    html += `<tr${hasData ? '' : ' class="no-data-row"'}>
      <td class="name-cell" title="${esc(name)}">${esc(name)}</td>
      <td>${v(c.Approved||0)}</td>
      <td>${v(c['Not Approved']||0)}</td>
      <td>${v(c.Done||0)}</td>
      <td>${v(c.Transferred||0)}</td>
      <td>${v(c.Cancelled||0)}</td>
      ${vp(c.Pending||0)}
      ${vp(c['Need Help']||0)}
      ${vp(c['Follow Up']||0)}
      ${vp(c.Initiated||0)}
      ${vp(c['Not Started']||0)}
      <td class="num-cell">${v(c.Total||0)}</td>
    </tr>`;
  });

  html += `</tbody>
  <tfoot><tr>
    <td class="name-cell">Totals</td>
    <td>${tot.Approved||'—'}</td>
    <td>${tot['Not Approved']||'—'}</td>
    <td>${tot.Done||'—'}</td>
    <td>${tot.Transferred||'—'}</td>
    <td>${tot.Cancelled||'—'}</td>
    <td>${tot.Pending||'—'}</td>
    <td>${tot['Need Help']||'—'}</td>
    <td>${tot['Follow Up']||'—'}</td>
    <td>${tot.Initiated||'—'}</td>
    <td>${tot['Not Started']||'—'}</td>
    <td>${tot.Total||'—'}</td>
  </tr></tfoot>
  </table></div>`;

  wrap.innerHTML = html;
}

// ── Main render ──────────────────────────────────────────────
function render() { updateStats(); updatePeriodInfo(); renderTable(); }

// ── Load ─────────────────────────────────────────────────────
function loadData() {
  setRefreshing(true);
  const old = document.getElementById('_jsonp');
  if (old) old.remove();
  const cb    = 'altusTaskCb_' + Date.now();
  const timer = setTimeout(() => { cleanup(cb); showError('Request timed out. Check Apps Script deployment.'); }, 15000);

  window[cb] = function(data) {
    clearTimeout(timer); cleanup(cb); setRefreshing(false);
    if (data.status === 'error') { showError(data.message); return; }
    allEmployeeData = data.employees || [];
    if (!allEmployeeData.length) { showError('No employee data found in Backend sheet.'); return; }
    buildDropdown();
    render();
  };

  const sc   = document.createElement('script');
  sc.id      = '_jsonp';
  sc.src     = SCRIPT_URL + '?callback=' + cb + '&t=' + Date.now();
  sc.onerror = () => { clearTimeout(timer); cleanup(cb); setRefreshing(false); showError('Could not reach Apps Script. Verify the deployment URL.'); };
  document.body.appendChild(sc);
}

function cleanup(cb) { delete window[cb]; const s = document.getElementById('_jsonp'); if(s) s.remove(); }
function setRefreshing(on) {
  const btn = document.getElementById('refresh-btn');
  btn.classList.toggle('spinning', on); btn.disabled = on;
}
function showError(msg) {
  document.getElementById('main-wrap').innerHTML = `<div class="state-box">
    <div class="state-icon">⚠️</div>
    <div class="state-title">Error</div>
    <div class="state-sub">${esc(msg)}</div>
  </div>`;
  setRefreshing(false);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Init ─────────────────────────────────────────────────────
loadData();
</script>
