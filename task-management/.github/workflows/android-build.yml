name: Android APK

# Builds the native Altus Android app (android-app/) into a downloadable APK.
# This also serves as the real compile check the local sandbox couldn't run.
#
# Setup (one time):
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#     Name:  FIREBASE_API_KEY
#     Value: <the Firebase WEB api key for project altuscorp-e7140>
# Then push (or run manually via the Actions tab). The APK appears under the
# run's "Artifacts" as altus-debug-apk.

on:
  push:
    paths:
      - "android-app/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon -PFIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: altus-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
