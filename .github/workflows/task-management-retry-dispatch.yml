name: task-management — retry-dispatch cron

# GitHub-hosted cron that pings the Vercel-deployed
# /api/cron/retry-dispatch endpoint every 5 minutes. We use this instead
# of Vercel's native cron because the Hobby plan caps native crons at
# one run per day per cron — too slow for notification-retry semantics.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   TASK_MANAGEMENT_URL          — base URL of the Vercel deployment,
#                                  e.g. https://altus-corp-dashboard.vercel.app
#                                  (no trailing slash)
#   TASK_MANAGEMENT_CRON_SECRET  — same value as CRON_SECRET in the
#                                  Vercel project's env vars (the
#                                  endpoint validates the Bearer token)
#
# GitHub Actions cron is best-effort: scheduled runs can slip by a few
# minutes during peak load on shared runners. Acceptable for retry
# semantics where 5–10 min variability doesn't matter.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual triggering from the Actions tab

# Only one run at a time. If a previous invocation is still in-flight
# the next one is dropped (cancel-in-progress: false → don't kill the
# running one; GitHub queues a single follow-up that runs after).
concurrency:
  group: task-management-retry-dispatch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST /api/cron/retry-dispatch
        env:
          DEPLOY_URL:   ${{ secrets.TASK_MANAGEMENT_URL }}
          CRON_SECRET:  ${{ secrets.TASK_MANAGEMENT_CRON_SECRET }}
        run: |
          if [ -z "${DEPLOY_URL}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "::error::Missing TASK_MANAGEMENT_URL or TASK_MANAGEMENT_CRON_SECRET repo secret"
            exit 1
          fi
          # Strip any accidental trailing slash on the URL.
          url="${DEPLOY_URL%/}/api/cron/retry-dispatch"
          status=$(curl --silent --show-error \
            --output /tmp/body \
            --write-out "%{http_code}" \
            --max-time 30 \
            --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Content-Length: 0" \
            "$url" || echo "000")
          echo "HTTP ${status}"
          # Echo a (truncated) body for easier debugging in the run log.
          head -c 1024 /tmp/body 2>/dev/null || true
          echo
          if [ "$status" != "200" ] && [ "$status" != "204" ]; then
            echo "::error::retry-dispatch returned HTTP ${status}"
            exit 1
          fi
